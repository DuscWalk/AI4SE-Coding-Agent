stages:
  - test
  - build

unit-test:
  stage: test
  image: python:3.11
  before_script:
    - pip install -e ".[dev]"
  script:
    - pytest tests/ -v --tb=short
    - ruff check coding_agent/ tests/
    - mypy coding_agent/

docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t coding-agent .
