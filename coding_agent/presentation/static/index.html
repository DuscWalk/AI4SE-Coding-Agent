<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Agent Harness</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <h1>Coding Agent Harness</h1>
    <div class="header-right">
      <span id="status-indicator" class="status-offline">Disconnected</span>
    </div>
  </header>

  <!-- Main Layout -->
  <div id="layout">

    <!-- Sidebar -->
    <aside id="sidebar">
      <nav class="sidebar-tabs">
        <button class="sidebar-tab active" data-panel="sessions">Sessions</button>
        <button class="sidebar-tab" data-panel="settings">Settings</button>
      </nav>
      <div class="sidebar-content">
        <!-- Sessions Panel -->
        <div id="sessions-panel">
          <div class="empty-state" style="text-align:center;padding:var(--space-6);color:var(--meta);font-size:var(--text-sm);">No sessions yet.</div>
        </div>
        <!-- Settings Panel -->
        <div id="settings-panel" class="hidden">
          <div id="credential-status" class="credential-status not-configured">Checking credentials...</div>
          <div class="field">
            <label for="api-key-input">API Key</label>
            <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off">
          </div>
          <div style="display:flex;gap:var(--space-2);">
            <button class="btn btn-primary" onclick="setCredentials()">Set Key</button>
            <button class="btn btn-ghost" onclick="clearCredentials()">Clear</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main id="main">

      <!-- Task Input (Command Bar) -->
      <div id="task-bar">
        <form onsubmit="event.preventDefault(); submitTask();">
          <input type="text" id="goal-input" placeholder="Enter a coding task, e.g. 'Add a parse_date function to src/utils.py'..." autocomplete="off" disabled>
          <button class="btn btn-primary" id="run-btn" type="submit" disabled>Run</button>
          <button class="btn btn-ghost" id="cancel-btn" type="button" onclick="cancelTask()" disabled>Cancel</button>
        </form>
      </div>

      <!-- Terminal / Step Log -->
      <div id="terminal">
        <div class="empty-state">Submit a task to begin.</div>
      </div>

      <!-- Approval Bar -->
      <div id="approval-bar">
        <span class="approval-label">Approval Required</span>
        <span class="approval-detail" id="approval-detail"></span>
        <button class="btn btn-success" onclick="approve()">Approve</button>
        <button class="btn btn-danger" onclick="deny()">Deny</button>
      </div>

    </main>
  </div>

  <!-- Session Detail Overlay -->
  <div id="detail-overlay">
    <div id="detail-panel">
      <div class="detail-header">
        <div>
          <h3 id="detail-title">Session Detail</h3>
          <div class="detail-meta" id="detail-meta"></div>
        </div>
        <button class="btn btn-ghost" onclick="closeDetail()" style="padding:4px 8px;font-size:var(--text-xs);">Esc</button>
      </div>
      <div class="detail-body" id="detail-content"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
